  <rect x="13" y="14" width="9" height="1" fill="#CBD5E1"/>
  <rect x="13" y="18" width="9" height="1" fill="#CBD5E1"/>
  <rect x="13" y="22" width="6" height="1" fill="#CBD5E1"/>
