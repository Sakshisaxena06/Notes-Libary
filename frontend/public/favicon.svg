<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Notebook cover -->
  <rect x="6" y="4" width="20" height="24" rx="2" fill="#4F46E5"/>
  <!-- Spiral binding -->
  <circle cx="8" cy="8" r="1.5" fill="#1E1B4B"/>
  <circle cx="8" cy="13" r="1.5" fill="#1E1B4B"/>
  <circle cx="8" cy="18" r="1.5" fill="#1E1B4B"/>
  <circle cx="8" cy="23" r="1.5" fill="#1E1B4B"/>
  <!-- Pages -->
